{{ define "main" }}
{{ $raw := readFile "static/blogs/andromeda-rice-blog.html" }}
{{ $body := replaceRE `(?s)^.*<body>\s*` "" $raw }}
{{ $body = replaceRE `(?s)\s*<script>.*$` "" $body }}
{{ $body = replaceRE `(?s)<footer>.*?</footer>` "" $body }}
{{ $body = replaceRE `(?s)<div id="progress-bar">.*?</div></div>` "" $body }}

{{/* Load blog-specific fonts */}}
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,400;0,500;0,700;1,400&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">

{{/* Reading progress bar */}}
<div id="progress-bar"><div id="progress-fill"></div></div>

<section id="blogs">
  <div class="container blog andromeda-blog-host py-4 py-md-5">
    <div class="section-title animate-on-scroll">
      <h2>Blog</h2>
    </div>
    <div class="card">
      <div class="card-body andromeda-blog-content">
        {{ $body | safeHTML }}
      </div>
    </div>
  </div>
</section>

<script>
document.addEventListener('DOMContentLoaded', function () {
  const root = document.querySelector('.andromeda-blog-content');
  if (!root) return;

  // progress bar from the original article, now scoped to this page
  const fill = document.getElementById('progress-fill');
  if (fill) {
    window.addEventListener('scroll', function () {
      const d = document.documentElement;
      const pct = d.scrollTop / (d.scrollHeight - d.clientHeight);
      fill.style.width = (pct * 100) + '%';
    }, { passive: true });
  }

  const sections = root.querySelectorAll('.section');
  const observer = new IntersectionObserver(function (entries) {
    entries.forEach(function (e) {
      if (e.isIntersecting) e.target.classList.add('visible');
    });
  }, { threshold: 0.07, rootMargin: '0px 0px -40px 0px' });
  sections.forEach(function (s) { observer.observe(s); });

  const tocLinks = root.querySelectorAll('.toc-link');
  const sectionEls = Array.from(root.querySelectorAll('section[id]'));
  const tocObserver = new IntersectionObserver(function (entries) {
    entries.forEach(function (e) {
      if (!e.isIntersecting) return;
      tocLinks.forEach(function (l) { l.classList.remove('active'); });
      const active = root.querySelector('.toc-link[href="#' + e.target.id + '"]');
      if (active) active.classList.add('active');
    });
  }, { threshold: 0.4 });
  sectionEls.forEach(function (s) { tocObserver.observe(s); });

  root.querySelectorAll('.copy-btn').forEach(function (btn) {
    btn.addEventListener('click', function () {
      const target = document.getElementById(btn.dataset.target);
      if (!target) return;
      const text = target.innerText;
      navigator.clipboard.writeText(text).then(function () {
        btn.textContent = 'COPIED!';
        btn.classList.add('copied');
        setTimeout(function () {
          btn.textContent = 'COPY';
          btn.classList.remove('copied');
        }, 2000);
      });
    });
  });
});
</script>
{{ end }}
